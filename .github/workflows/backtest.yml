name: Backtest

on:
  workflow_dispatch: {}
  schedule:
    - cron: "15 2 * * *" # Daily at 02:15 UTC

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backtest-repo/requirements.txt
      - name: Backtest (last 30 days)
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_NAME_BT: ${{ secrets.DB_NAME_BT }}
        run: |
          python -m backtest-repo.src.backtest --days 30 --db-name ${{ env.DB_NAME_BT }} --prices-table ohlcv_1h_250_coins --signals-table FE_DMV_ALL > backtest_stats.txt
      - name: Upload stats artifact
        uses: actions/upload-artifact@v4
        with:
          name: backtest-stats
          path: backtest_stats.txt

